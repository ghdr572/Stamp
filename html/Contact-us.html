<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>تواصل معنا - طابع</title>
</head>
<body>
    <nav>
        <div class="menu">
            <div class="logo"><a href="index.html">طَابع</a></div>
            <ul>
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="monthly.html">الموضوع الشهري</a></li>
                <li><a href="Subscription.html">الاشتراك</a></li>
                <li><a href="about.html">من نحن</a></li>
                <li><a href="Contact-us.html">تواصل معنا</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <h2 class="title">تواصل معنا</h2>
        <p class="description">يسعدنا تلقي استفساراتكم ومساهماتكم الإبداعية.</p>

        <form action="#" method="POST">
            <div class="form-group">
                <label>نوع التواصل:</label>
                <div class="radio-group">
                    <input type="radio" id="inquiry" name="type" value="inquiry" checked>
                    <label for="inquiry">استفسار</label>
                    
                    <input type="radio" id="contribution" name="type" value="contribution">
                    <label for="contribution">مشاركة</label>
                </div>
            </div>

            <div class="form-group">
                <label for="fname">الاسم الكامل:</label>
                <input type="text" id="fname" name="fname" 
                       required 
                       minlength="3" 
                       pattern="[A-Za-zأ-ي\s]+" 
                       placeholder="ادخل اسمك الثلاثي">
            </div>

            <div class="form-group">
                <label>الجنس:</label>
                <div class="radio-group">
                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">ذكر</label>
                    
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">أنثى</label>
                </div>
            </div>

            <div class="form-group">
                <label for="mobile">رقم الجوال:</label>
                <input type="tel" id="mobile" name="mobile" 
                       placeholder="05xxxxxxxx" 
                       required 
                       pattern="05[0-9]{8}" 
                       maxlength="10">
            </div>

            <div class="form-group">
                <label for="email">البريد الإلكتروني:</label>
                <input type="email" id="email" name="email" 
                       required 
                       placeholder="example@mail.com">
            </div>

            <div class="form-group">
                <label for="dob">تاريخ الميلاد:</label>
                <input type="date" id="dob" name="dob" required>
            </div>

            <div class="form-group">
                <label for="language">لغة التواصل المفضلة:</label>
                <select id="language" name="language">
                    <option value="arabic">العربية</option>
                    <option value="english">الإنجليزية</option>
                    <option value="french">الفرنسية</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">رسالتك:</label>
                <textarea id="message" name="message" rows="5" required minlength="10" placeholder="اكتب رسالتك هنا..."></textarea>
            </div>

            <div style="text-align: center;">
                <input type="submit" value="إرسال" class="btn-primary">
                <input type="reset" value="مسح">
            </div>
        </form>
    </main>

    <footer class="footer-simple">
        <h3 class="card-title">طَابع</h3>
        <p>فن الرسائل والأدب والفنون البصرية بالعربية </p>
        <p>© 2026 جميع الحقوق محفوظة. فريق طابع جامعة جدة</p>
    </footer>
</body>
</html>
